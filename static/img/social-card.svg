<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F1F"/>
      <stop offset="100%" stop-color="#0B1A3A"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="50%" stop-color="#5E5CE6"/>
      <stop offset="100%" stop-color="#5AC8FA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0%" stop-color="#5AC8FA" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#5AC8FA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g transform="translate(80, 90)">
    <rect width="120" height="40" rx="20" fill="rgba(90,200,250,0.15)" stroke="rgba(90,200,250,0.4)"/>
    <text x="60" y="26" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="16" font-weight="600" fill="#5AC8FA">TRAINING</text>
  </g>

  <text x="80" y="240" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="92" font-weight="800" fill="url(#brand)">iOS Development</text>
  <text x="80" y="320" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="64" font-weight="700" fill="#F8FAFC">Complete Guide</text>

  <text x="80" y="380" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="24" font-weight="400" fill="#94A3B8">Swift · SwiftUI · Architecture · Concurrency · Publishing</text>

  <g transform="translate(80, 460)" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="20" font-weight="600">
    <g>
      <rect width="180" height="56" rx="28" fill="rgba(0,122,255,0.18)" stroke="rgba(0,122,255,0.5)"/>
      <text x="90" y="36" text-anchor="middle" fill="#5AC8FA">13 Modules</text>
    </g>
    <g transform="translate(200,0)">
