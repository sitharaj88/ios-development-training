      <text x="120" y="36" text-anchor="middle" fill="#FBBF24">5 Real Projects</text>
    </g>
  </g>

  <g transform="translate(950, 200)">
    <circle cx="100" cy="100" r="120" fill="none" stroke="url(#brand)" stroke-width="3" opacity="0.35"/>
    <circle cx="100" cy="100" r="80" fill="none" stroke="url(#brand)" stroke-width="3" opacity="0.55"/>
    <circle cx="100" cy="100" r="50" fill="url(#brand)"/>
    <text x="100" y="115" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="40" font-weight="800" fill="#0A0F1F">iOS</text>
